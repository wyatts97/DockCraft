<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockCraft · Dashboard</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="dashboard" data-page="dashboard" data-crumbs="Server | Dashboard">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">
          <section class="hero">
            <div class="hero-text">
              <span class="eyebrow" id="heroDate">—</span>
              <h1 class="hero-title">Your <span class="accent">Bedrock</span> server</h1>
              <p class="hero-sub">Start, stop, and keep an eye on your Minecraft server at a glance.</p>
            </div>
            <div class="hero-actions">
              <button class="btn btn--primary" data-action="start">
                <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9z"/></svg>
                Start
              </button>
              <button class="btn btn--ghost" data-action="restart">
                <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.3M21 3v6h-6"/></svg>
                Restart
              </button>
              <button class="btn btn--danger" data-action="stop">
                <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                Stop
              </button>
            </div>
          </section>

          <div class="dc-stat-grid">
            <div class="dc-stat">
              <div class="dc-stat-label">Status</div>
              <div class="dc-stat-value"><span id="statStatus" class="dc-status dc-status--absent">—</span></div>
            </div>
            <div class="dc-stat">
              <div class="dc-stat-label">Players online</div>
              <div class="dc-stat-value" id="statPlayers">0</div>
            </div>
            <div class="dc-stat">
              <div class="dc-stat-label">CPU usage</div>
              <div class="dc-stat-value" id="statCpu">0%</div>
            </div>
            <div class="dc-stat">
              <div class="dc-stat-label">Memory</div>
              <div class="dc-stat-value" id="statMem">0%</div>
            </div>
            <div class="dc-stat">
              <div class="dc-stat-label">Uptime</div>
              <div class="dc-stat-value" id="statUptime">—</div>
            </div>
          </div>

          <section class="card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">Live</span>
                <h2 class="card-title">Recent events</h2>
              </div>
            </div>
            <div id="eventFeed">
              <div class="dc-empty-cell" data-empty>Waiting for server activity…</div>
            </div>
          </section>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
