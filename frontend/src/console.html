<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockCraft · Console</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="console" data-page="console" data-crumbs="Server | Console">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">
          <section class="card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">Live output</span>
                <h2 class="card-title">Server console</h2>
              </div>
              <button class="btn btn--ghost btn--sm" id="consoleClear">Clear</button>
            </div>
            <div id="consoleOutput" class="dc-console"></div>
            <form id="consoleForm" class="dc-console-form">
              <input id="consoleInput" class="input" type="text" placeholder="Type a command, e.g. say Hello or time set day" autocomplete="off">
              <button class="btn btn--primary" type="submit">Send</button>
            </form>
          </section>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
