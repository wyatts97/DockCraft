<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockCraft · Worlds</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="256x256" href="/assets/static/images/dockcraft.png">
    <link rel="apple-touch-icon" href="/assets/static/images/dockcraft.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="application-name" content="DockCraft">
    <meta name="theme-color" content="#3B82F6">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="worlds" data-page="worlds" data-crumbs="Content | Worlds">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">
          <div class="grid">
            <section class="card col-6">
              <div class="card-head">
                <div class="card-title-wrap">
                  <span class="eyebrow">Active</span>
                  <h2 class="card-title">Current world</h2>
                </div>
                <button class="btn btn--primary btn--sm" id="backupBtn">
                  <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                  Create backup
                </button>
              </div>
              <div id="worldInfo"><div class="dc-empty-cell">Loading…</div></div>
              <p class="cell-date" style="margin-top:14px">Last backup: <span id="lastBackup">—</span></p>
            </section>

            <section class="card col-6">
              <div class="card-head">
                <div class="card-title-wrap">
                  <span class="eyebrow">Import</span>
                  <h2 class="card-title">Upload a world</h2>
                </div>
              </div>
              <div class="dc-danger-note">Uploading replaces your current world. The server will stop and restart.</div>
              <div id="worldDrop" class="dc-drop">
                Drag &amp; drop a world <strong>.zip</strong> here, or click to browse.
                <input id="worldFile" type="file" accept=".zip" hidden>
              </div>
            </section>
          </div>

          <section class="card" style="margin-top:20px">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">History</span>
                <h2 class="card-title">Backups</h2>
              </div>
            </div>
            <div class="table-scroll">
              <table class="table">
                <thead><tr><th>Backup</th><th>Created</th><th></th></tr></thead>
                <tbody id="backupsBody">
                  <tr><td colspan="3" class="dc-empty-cell">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </section>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
