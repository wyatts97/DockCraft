<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockCraft · Players</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="players" data-page="players" data-crumbs="Server | Players">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">
          <div class="grid">
            <section class="card col-6">
              <div class="card-head">
                <div class="card-title-wrap">
                  <span class="eyebrow">Right now</span>
                  <h2 class="card-title">Online players <span id="onlineCount">0</span></h2>
                </div>
              </div>
              <div class="table-scroll">
                <table class="table">
                  <thead><tr><th>Player</th><th>Joined</th></tr></thead>
                  <tbody id="onlineBody">
                    <tr><td colspan="2" class="dc-empty-cell">Loading…</td></tr>
                  </tbody>
                </table>
              </div>
            </section>

            <section class="card col-6">
              <div class="card-head">
                <div class="card-title-wrap">
                  <span class="eyebrow">Access</span>
                  <h2 class="card-title">Allowlist</h2>
                </div>
              </div>
              <form id="addPlayerForm" class="dc-console-form" style="margin-bottom:18px">
                <input name="gamertag" class="input" type="text" placeholder="Add by Xbox gamertag" autocomplete="off">
                <button class="btn btn--primary" type="submit">Add</button>
              </form>
              <div class="table-scroll">
                <table class="table">
                  <thead><tr><th>Player</th><th></th></tr></thead>
                  <tbody id="allowlistBody">
                    <tr><td colspan="2" class="dc-empty-cell">Loading…</td></tr>
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
