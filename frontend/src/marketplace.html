<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockCraft · Marketplace</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="256x256" href="/assets/static/images/dockcraft.png">
    <link rel="apple-touch-icon" href="/assets/static/images/dockcraft.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="application-name" content="DockCraft">
    <meta name="theme-color" content="#3B82F6">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="marketplace" data-page="marketplace" data-crumbs="Content | Marketplace">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">
          <section class="hero">
            <div class="hero-text">
              <span class="eyebrow" id="heroDate">—</span>
              <h1 class="hero-title">Mod <span class="accent">Marketplace</span></h1>
              <p class="hero-sub">Browse popular CurseForge add-ons and install them with one click.</p>
            </div>
            <div class="hero-actions">
              <button class="btn btn--ghost" id="mktRefresh">
                <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.3M21 3v6h-6"/></svg>
                Refresh
              </button>
            </div>
          </section>

          <div class="dc-banner">Add-ons are sourced from CurseForge. DockCraft does not host these files. <span id="mktUpdated"></span></div>

          <div style="margin-bottom:16px">
            <input id="mktSearch" class="input" type="text" placeholder="Search packs…" autocomplete="off">
          </div>
          <div class="dc-chip-row" id="mktChips"></div>

          <div id="mktGrid" class="dc-mkt-grid">
            <div class="dc-empty-cell">Loading…</div>
          </div>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
