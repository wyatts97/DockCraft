<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockCraft · Setup</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-page="setup">
    <div style="min-height:100vh; display:grid; place-items:center; padding:24px; background:var(--bg-body)">
      <div class="card dc-wizard" id="setupWizard" style="width:min(620px,96vw)">
        <div class="card-head">
          <div class="card-title-wrap">
            <span class="eyebrow">First-run setup</span>
            <h2 class="card-title">Welcome to DockCraft</h2>
          </div>
        </div>

        <div class="dc-wizard-dots">
          <div class="dc-wizard-dot is-active" data-dot></div>
          <div class="dc-wizard-dot" data-dot></div>
          <div class="dc-wizard-dot" data-dot></div>
        </div>

        <!-- Step 1: server basics -->
        <div class="dc-wizard-step is-active" data-step>
          <div class="dc-field-grid">
            <div class="dc-field">
              <div class="dc-field-label">Server name</div>
              <input id="serverName" class="input" type="text" value="DockCraft Server">
            </div>
            <div class="dc-field">
              <div class="dc-field-label">Game mode</div>
              <select id="gamemode" class="input">
                <option value="survival">survival</option>
                <option value="creative">creative</option>
                <option value="adventure">adventure</option>
              </select>
            </div>
            <div class="dc-field">
              <div class="dc-field-label">Difficulty</div>
              <select id="difficulty" class="input">
                <option value="peaceful">peaceful</option>
                <option value="easy">easy</option>
                <option value="normal" selected>normal</option>
                <option value="hard">hard</option>
              </select>
            </div>
            <div class="dc-field">
              <div class="dc-field-label">Max players</div>
              <input id="maxPlayers" class="input" type="number" value="10" min="1">
            </div>
          </div>
          <div class="dc-wizard-actions">
            <span></span>
            <button class="btn btn--primary" data-next>Continue</button>
          </div>
        </div>

        <!-- Step 2: network + admin account -->
        <div class="dc-wizard-step" data-step>
          <div class="dc-field-grid">
            <div class="dc-field">
              <div class="dc-field-label">Server port</div>
              <input id="port" class="input" type="number" value="19132">
            </div>
            <div class="dc-field">
              <div class="dc-field-label">Require Xbox login</div>
              <label class="dc-switch"><input id="onlineMode" type="checkbox" checked><span class="dc-switch-track"></span></label>
            </div>
            <div class="dc-field">
              <div class="dc-field-label">Use allowlist</div>
              <label class="dc-switch"><input id="allowList" type="checkbox"><span class="dc-switch-track"></span></label>
            </div>
          </div>
          <div class="dc-danger-note" style="margin-top:18px">Create your admin account — you'll use this to sign in.</div>
          <div class="dc-field-grid">
            <div class="dc-field">
              <div class="dc-field-label">Admin username</div>
              <input id="adminUser" class="input" type="text" autocomplete="username">
            </div>
            <div class="dc-field">
              <div class="dc-field-label">Admin password</div>
              <input id="adminPass" class="input" type="password" autocomplete="new-password">
            </div>
          </div>
          <div class="dc-wizard-actions">
            <button class="btn btn--ghost" data-prev>Back</button>
            <button class="btn btn--primary" data-next>Review</button>
          </div>
        </div>

        <!-- Step 3: review -->
        <div class="dc-wizard-step" data-step>
          <div id="reviewList"></div>
          <div class="dc-wizard-actions">
            <button class="btn btn--ghost" data-prev>Back</button>
            <button class="btn btn--primary" id="finishSetup">
              <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9z"/></svg>
              Launch Server
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
