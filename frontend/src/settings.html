<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockCraft · Settings</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="settings" data-page="settings" data-crumbs="Configuration | Settings">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">
          <section class="card" id="settingsTabs">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">Configuration</span>
                <h2 class="card-title">Server settings</h2>
              </div>
              <button class="btn btn--primary" id="saveSettings">
                <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
                Save &amp; Restart
              </button>
            </div>
            <div id="settingsTabNav" class="dc-tab-nav"></div>
            <div id="settingsTabBody"></div>
          </section>

          <section class="card" id="settingsProfile" style="margin-top:22px">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">Account</span>
                <h2 class="card-title">Your profile</h2>
              </div>
            </div>
            <div class="dc-field-grid" style="margin-bottom:18px">
              <div class="dc-field">
                <div class="dc-field-label">Signed in as</div>
                <div class="cell-name" id="profileName" style="font-size:14px">—</div>
              </div>
              <div class="dc-field">
                <div class="dc-field-label">Password</div>
                <div class="cell-date" style="font-size:14px">Last changed: <span id="profilePwHint">unknown</span></div>
                <button class="btn btn--ghost btn--sm" type="button" id="changePasswordBtn" style="align-self:flex-start; margin-top:6px">Change password</button>
              </div>
            </div>
          </section>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
