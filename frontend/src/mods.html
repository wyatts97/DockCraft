<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockCraft · Installed Mods</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="256x256" href="/assets/static/images/dockcraft.png">
    <link rel="apple-touch-icon" href="/assets/static/images/dockcraft.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="application-name" content="DockCraft">
    <meta name="theme-color" content="#3B82F6">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="mods" data-page="mods" data-crumbs="Content | Installed Mods">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">
          <section class="card" style="margin-bottom:20px">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">Add-ons</span>
                <h2 class="card-title">Upload a pack</h2>
              </div>
            </div>
            <div id="modDrop" class="dc-drop">
              Drag &amp; drop a <strong>.mcaddon</strong> or <strong>.mcpack</strong> here, or click to browse.
              <input id="modFile" type="file" accept=".mcaddon,.mcpack,.zip" hidden>
            </div>
          </section>

          <div id="modsGrid" class="dc-card-grid">
            <div class="dc-empty-cell">Loading…</div>
          </div>
        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
